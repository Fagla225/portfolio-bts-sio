<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact — Raoul Fagla</title>

    <style>

        /* je remets tout a zero */
        * {
            margin: 0;
            padding: 0;
        }

        /* fond bleu clair pour toute la page */
        body {
            font-family: Arial, sans-serif;
            color: #333;
            background-color: #f0f4ff;
        }

        /* la barre en haut */
        nav {
            background-color: #1a73e8;
            padding: 15px 20px;
        }

        nav h1 {
            color: white;
            font-size: 1.2rem;
        }

        /* la carte blanche au milieu */
        .carte {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 30px 25px;
            max-width: 480px;
            margin: 40px auto;
        }

        .carte h2 {
            color: #1a73e8;
            margin-bottom: 8px;
        }

        .carte p {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* chaque champ avec son label */
        .groupe {
            margin-bottom: 20px;
        }

        /* le texte au dessus du champ */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        /* les champs de saisie */
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
            color: #333;
            /* box-sizing evite que le champ depasse la largeur */
            box-sizing: border-box;
        }

        /* quand on clique sur un champ il devient bleu */
        input:focus, textarea:focus {
            border-color: #1a73e8;
            outline: none;
        }

        /* la zone de texte pour le message */
        textarea {
            height: 120px;
            resize: vertical;
        }

        /* le bouton envoyer */
        .bouton {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            cursor: pointer;
        }

        /* le bas de page */
        footer {
            background-color: #111;
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

    </style>
</head>

<body>

    <!-- la navigation -->
    <nav>
        <h1>Raoul Fagla</h1>
    </nav>

    <!-- le formulaire dans sa carte blanche -->
    <div class="carte">
        <h2>Contactez-moi</h2>
        <p>Remplissez ce formulaire pour m'envoyer un message.</p>

        <!-- action="#" car je n'ai pas encore appris le langage serveur -->
        <form action="#">

            <!-- champ pour le nom -->
            <div class="groupe">
                <label for="nom">Nom</label>
                <input
                    type="text"
                    id="nom"
                    name="nom"
                    placeholder="Votre nom"
                >
            </div>

            <!-- champ pour l'email -->
            <div class="groupe">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="votre@email.com"
                >
            </div>

            <!-- champ pour le message -->
            <div class="groupe">
                <label for="message">Message</label>
                <textarea
                    id="message"
                    name="message"
                    placeholder="Écrivez votre message ici..."
                ></textarea>
            </div>

            <!-- bouton pour envoyer -->
            <button type="submit" class="bouton">Envoyer</button>

        </form>
    </div>

    <!-- pied de page -->
    <footer>
        <p>© 2026 Raoul Fagla — HTML / CSS</p>
    </footer>

</body>
                    </html>
